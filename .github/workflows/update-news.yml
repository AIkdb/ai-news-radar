name: Update AI News Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-ai-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare OPML (public follow.opml committed to repo)
        run: |
          mkdir -p feeds
          if [ -f feeds/follow.opml ]; then
            echo "Using committed feeds/follow.opml ($(wc -l < feeds/follow.opml) lines)"
          else
            echo "WARNING: follow.opml not found, using built-in sources only"
          fi

      - name: Update data
        env:
          EMAIL_DIGEST_ENABLED: ${{ secrets.EMAIL_DIGEST_ENABLED || vars.EMAIL_DIGEST_ENABLED }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
          AGENTMAIL_API_BASE_URL: ${{ vars.AGENTMAIL_API_BASE_URL }}
          AGENTMAIL_LIMIT: ${{ vars.AGENTMAIL_LIMIT }}
          AGENTMAIL_ALLOWED_SENDER_DOMAINS: ${{ vars.AGENTMAIL_ALLOWED_SENDER_DOMAINS }}
          X_API_ENABLED: ${{ secrets.X_API_ENABLED || vars.X_API_ENABLED }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_QUERY: ${{ vars.X_API_QUERY }}
          X_API_MAX_RESULTS: ${{ vars.X_API_MAX_RESULTS }}
          X_API_DAILY_POST_LIMIT: ${{ vars.X_API_DAILY_POST_LIMIT }}
          X_API_RUN_UTC_HOUR: ${{ vars.X_API_RUN_UTC_HOUR }}
          X_API_RUN_UTC_MINUTE_MAX: ${{ vars.X_API_RUN_UTC_MINUTE_MAX }}
          RSS_MAX_FEEDS: ${{ vars.RSS_MAX_FEEDS || 50 }}
        run: |
          if [ -f feeds/follow.opml ]; then
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 21 --rss-opml feeds/follow.opml --rss-max-feeds "${RSS_MAX_FEEDS:-10}"
          else
            python scripts/update_news.py --output-dir data --window-hours 24 --archive-days 21
          fi

      - name: Upload artifacts (GitHub Actions run - data available as workflow artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ai-news-snapshot
          path: data/latest-24h.json data/waytoagi-7d.json data/source-status.json
          retention-days: 1

      - name: Commit and push changes (requires repo-level PAT with contents:write)
        if: false  # Disabled: Fine-Grained PAT lacks contents:write. Data available via artifacts.
        env:
          EMAIL_DIGEST_PUBLISH: ${{ secrets.EMAIL_DIGEST_PUBLISH || vars.EMAIL_DIGEST_PUBLISH }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-24h.json data/latest-24h-all.json data/archive.json data/source-status.json data/waytoagi-7d.json data/title-zh-cache.json
          if [ -f data/email-digest.json ] && [ "$EMAIL_DIGEST_PUBLISH" = "1" ]; then
            git add data/email-digest.json
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update ai news snapshot"
          git push
